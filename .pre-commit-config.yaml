repos:
  - repo: local
    hooks:
      - id: terminology-guard
        name: Terminology Guard
        entry: precommit-scripts/check-terminology
        language: script
        types: [text]

      - id: terminology-commit-msg
        name: Terminology Guard (commit message)
        entry: precommit-scripts/check-commit-msg
        language: script
        stages: [commit-msg]

      - id: black
        name: Black (auto-fix)
        entry: bash -c 'poetry run python -m black . && git add -u'
        language: system
        pass_filenames: false
        always_run: true

      - id: python-fp-lint
        name: Python FP lint (warnings only)
        entry: bash -c 'poetry run python -m python_fp_lint check interpreter/ || true'
        language: system
        pass_filenames: false
        always_run: true

      - id: pyright
        name: Pyright type check (warnings only)
        entry: bash -c 'poetry run pyright || true'
        language: system
        pass_filenames: false
        always_run: true

      - id: import-linter
        name: import-linter architectural contracts
        entry: poetry run lint-imports
        language: system
        pass_filenames: false
        always_run: true

      - id: tests
        name: Full test suite
        entry: poetry run python -m pytest tests/ -x -q
        language: system
        pass_filenames: false
        always_run: true

      # Temporarily disabled — these hooks rewrite tracked files (the gaps-doc
      # datestamp / issues.jsonl) during pre-commit, which intermittently aborts
      # commits. Re-enable once they no longer mutate the tree mid-commit.
