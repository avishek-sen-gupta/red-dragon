repos:
  - repo: local
    hooks:
      - id: terminology-guard
        name: Terminology Guard
        entry: precommit-scripts/check-terminology
        language: script
        types: [text]

      - id: terminology-commit-msg
        name: Terminology Guard (commit message)
        entry: precommit-scripts/check-commit-msg
        language: script
        stages: [commit-msg]

      - id: black
        name: Black (auto-fix)
        entry: bash -c 'uv run python -m black . && git add -u'
        language: system
        pass_filenames: false
        always_run: true

      - id: python-fp-lint
        name: Python FP lint (warnings only)
        entry: bash -c 'uv run python -m python_fp_lint check interpreter/ || true'
        language: system
        pass_filenames: false
        always_run: true

      - id: pyright
        name: Pyright type check (warnings only)
        entry: bash -c 'uv run pyright || true'
        language: system
        pass_filenames: false
        always_run: true

      - id: import-linter
        name: import-linter architectural contracts
        entry: uv run lint-imports
        language: system
        pass_filenames: false
        always_run: true

      - id: tests
        name: Full test suite (incl. mandatory CardDemo CICS e2e)
        # `make test` wires the CardDemo toolchain env (CARDDEMO_HOME +
        # BMS_TOOLS_HOME + PROLEAP_BRIDGE_JAR) and builds the JAR if missing, so
        # the now-mandatory-locally CardDemo e2e RUN here instead of hard-failing.
        # (A bare `pytest tests/` would error those ~3 modules — see
        # tests/integration/cics/conftest.py.)
        entry: make test PYTEST_ARGS="-x -q"
        language: system
        pass_filenames: false
        always_run: true

      # Temporarily disabled — these hooks rewrite tracked files (the gaps-doc
      # datestamp / issues.jsonl) during pre-commit, which intermittently aborts
      # commits. Re-enable once they no longer mutate the tree mid-commit.
