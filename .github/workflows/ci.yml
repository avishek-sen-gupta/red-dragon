name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Black formatting check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          pip install poetry
          poetry install --only dev
      - name: Check formatting with Black
        run: poetry run black --check interpreter/ tests/

  test:
    name: Unit and integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Build ProLeap bridge JAR
        working-directory: proleap-bridge
        run: ./build.sh
      - name: Install Python dependencies
        run: |
          pip install poetry
          poetry install
      - name: Run tests
        env:
          PROLEAP_BRIDGE_JAR: ${{ github.workspace }}/proleap-bridge/target/proleap-bridge-0.1.0-shaded.jar
        run: poetry run pytest tests/ -v

  bridge:
    name: ProLeap COBOL Bridge
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: proleap-bridge
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Build and test
        run: ./build.sh
