name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Formatting and architectural contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v6
      - name: Install dependencies
        run: uv sync --only-group dev
      - name: Check formatting with Black
        run: uv run black --check interpreter/ tests/
      - name: Check architectural contracts
        run: uv run lint-imports

  test:
    name: Unit and integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Build ProLeap bridge JAR
        working-directory: proleap-bridge
        run: ./build.sh
      - name: Install Python dependencies
        run: uv sync
      - name: Run tests
        env:
          PROLEAP_BRIDGE_JAR: ${{ github.workspace }}/proleap-bridge/target/proleap-bridge-0.1.0-shaded.jar
        run: uv run python -m pytest tests/ --cov --cov-report=term-missing --cov-fail-under=85 -q

  analysis:
    name: Code quality analysis
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v6
      - name: Install dependencies
        run: uv sync
      - name: Radon cyclomatic complexity
        run: uv run radon cc interpreter/ -s -n C
      - name: Radon maintainability index
        run: uv run radon mi interpreter/ -s -n B
      - name: Pylint (report only)
        run: uv run pylint interpreter/ --exit-zero
      - name: Pyright type check (report only)
        run: uv run pyright || true
      - name: Pydeps (dry run)
        run: uv run pydeps interpreter --no-show --no-output -T png 2>&1 || true

  bridge:
    name: ProLeap COBOL Bridge
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: proleap-bridge
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Build and test
        run: ./build.sh
